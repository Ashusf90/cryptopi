<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPi Login</title>
    <link rel="stylesheet" href="../static/style.css">
    <style>
        /* Local overrides for the Login Page layout */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-body);
        }

        .login-card {
            background-color: var(--bg-card);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-header h2 {
            color: var(--accent-primary);
            margin-bottom: 0.5rem;
            font-family: 'Courier New', monospace;
        }

        .login-header p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: var(--text-label);
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        .btn-block {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-primary {
            background-color: var(--accent-primary);
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            margin-top: 10px;
        }
        .btn-primary:hover { 
            background-color: #2980b9; 
            transform: translateY(-1px);
        }

        /* DIVIDER STYLING */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        /* GUEST SECTION */
        .btn-demo {
            background-color: #2c3e50;
            color: #ecf0f1;
            border: 1px solid #34495e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-demo:hover {
            background-color: #34495e;
            border-color: var(--accent-info);
            color: white;
        }

        .alert {
            background-color: rgba(231, 76, 60, 0.2);
            color: var(--accent-danger);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 1rem;
            border: 1px solid var(--accent-danger);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h2>CryptoPi V3.2.4</h2>
            <p>Secure Access Terminal</p>
        </div>

        {% if error %}
            <div class="alert">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <input type="text" id="username" name="username" class="form-control" placeholder="Username" required>
            </div>

            <div class="form-group">
                <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <button type="submit" name="action" value="login" class="btn-block btn-primary">Terminal Access Login</button>
        </form>

        <div class="divider">Beta Preview</div>

        <form method="POST" action="/login">
            <input type="hidden" name="username" value="guest">
            
            <div class="form-group">
                <label for="guest_pin">Have an Access Pin? You must be special.</label>
                <input type="password" id="guest_pin" name="password" class="form-control" placeholder="Enter PIN code" required>
            </div>

            <button type="submit" name="action" value="guest" class="btn-block btn-demo">
               <span>👀</span> Enter Preview Mode
            </button>
        </form>
    </div>
</body>
</html>
